<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesión</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  background:white;
  color:black;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  background:#243b55;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#141e30;
}

#msg{
  margin-top:10px;
  color:red;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Iniciar Sesión</h2>

  <input id="numero" placeholder="Número de servidor (10 dígitos)">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <p id="msg"></p>
</div>

<script>
const supabaseClient = supabase.createClient(
  'https://gdkrzncbvginxvmqorsg.supabase.co',
  'sb_publishable_gIQvD36G7KeKZu_OC4MI4w_QQKKEpcA'
);

async function login(){

  const numero = document.getElementById('numero').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');

  msg.innerText = '';

  // Validación
  if(numero.length !== 10 || isNaN(numero)){
    msg.innerText = '⚠️ El número debe tener 10 dígitos';
    return;
  }

  if(!password){
    msg.innerText = '⚠️ Ingresa la contraseña';
    return;
  }

  // Consulta
  const { data, error } = await supabaseClient
    .from('trabajadores')
    .select('*')
    .eq('numero_servicio', numero)
    .eq('password', password)
    .single();

  if(error || !data){
    msg.innerText = '❌ Datos incorrectos';
    return;
  }

  // Guardar sesión
  localStorage.setItem('user_id', data.id);

  // Redirección inteligente
  if(!data.password_cambiada){
    window.location.href = 'bienvenida.html';
  }else{
    window.location.href = 'panel.html';
  }
}
</script>

</body>
</html>
