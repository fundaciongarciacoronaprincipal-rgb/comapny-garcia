<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesión</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298,#00c6ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}
h2{
    color:white;
}
input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#0072ff;
}
p{
    color:white;
    min-height:20px;
}
</style>

</head>

<body>

<div class="container">
    <h2>Iniciar Sesión</h2>

    <!-- Campo servicio o referencia -->
    <input 
        type="text" 
        id="loginDato" 
        placeholder="Número de servicio o referencia"
        maxlength="10"
        oninput="this.value = this.value.replace(/[^0-9]/g,'')"
    >

    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p id="error"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://gdkrzncbvginxvmqorsg.supabase.co",
  "sb_publishable_gIQvD36G7KeKZu_OC4MI4w_QQKKEpcA"
);

async function login(){
    const dato = document.getElementById("loginDato").value.trim();
    const password = document.getElementById("password").value.trim();

    // Validar campos vacíos
    if(!dato || !password){
        document.getElementById("error").innerText = "⚠️ Llena todos los campos";
        return;
    }

    // Validar longitud (7 a 10 dígitos)
    if(dato.length < 7 || dato.length > 10){
        document.getElementById("error").innerText = "❌ Debe tener entre 7 y 10 dígitos";
        return;
    }

    try {
        const { data, error } = await supabaseClient
        .from("usuarios")
        .select("*")
        .or(`numero_servicio.eq.${dato},referencia.eq.${dato}`)
        .eq("password", password)
        .single();

        if(error || !data){
            document.getElementById("error").innerText = "❌ Datos incorrectos";
        }else{
            // Guardar sesión
            localStorage.setItem("servicio", data.numero_servicio);
            localStorage.setItem("cambio_password", data.cambio_password);

            // Redirigir
            window.location.href = data.link_redireccion;
        }

    } catch(e){
        document.getElementById("error").innerText = "⚠️ Error de conexión";
        console.error(e);
    }
}
</script>

</body>
</html>
